services:
  postgres:
    image: postgres:17
    container_name: auth_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_dev_db}
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev_user} -d ${POSTGRES_DB:-auth_dev_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - dev_net

volumes:
  postgres_dev_data:

networks:
  dev_net:
