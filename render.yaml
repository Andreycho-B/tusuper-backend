# Blueprint Render — Backend TuSuper API
databases:
  - name: tusuper-db
    plan: free
    databaseName: tusuper
    user: tusuper

services:
  - type: web
    name: tusuper-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_ENV_FILE
        value: 'true'
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: tusuper-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: '86400'
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: '465'
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SEED_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@tusuper.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: Admin
      - key: ADMIN_LAST_NAME
        value: TuSuper
